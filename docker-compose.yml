services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  frontend:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r backend/requirements.txt && streamlit run frontend/streamlit_app.py --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend
